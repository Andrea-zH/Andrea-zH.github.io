{{- define "content" -}}
    {{- $params := .Scratch.Get "params" -}}
    {{- $profile := .Site.Params.home.profile -}}

    <div class="page home" data-home="landing">
        {{- /* Profile */ -}}
        {{- if ne $profile.enable false -}}
            {{- partial "home/profile.html" . -}}
        {{- end -}}

        {{- /* Simple Landing Content */ -}}
        <div class="landing-content">
            <div class="subtitle-quote">
                <p class="quote-text">且将新火试新茶，诗酒趁年华</p>
            </div>

            <div class="enter-blog">
                <a href="/categories/" class="enter-button">
                    <span>进入花园</span>
                    <i class="fas fa-seedling"></i>
                </a>
            </div>
        </div>
    </div>

    <style>
        .landing-content {
            max-width: 600px;
            margin: 0 auto;
            padding: 3rem 2rem;
            text-align: center;
        }

        .subtitle-quote {
            margin-bottom: 2.5rem;
        }

        .quote-text {
            font-size: 1.3rem;
            color: #4a5568;
            font-family: 'Noto Serif SC', serif;
            font-weight: 500;
            letter-spacing: 0.1em;
            line-height: 1.8;
        }

        .enter-blog {
            margin-top: 2rem;
        }

        .enter-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.6rem 1.5rem;
            background: rgba(255, 255, 255, 0.7);
            color: #4a5568;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 500;
            transition: all 0.3s ease;
            border: 1px solid rgba(0, 0, 0, 0.08);
            backdrop-filter: blur(10px);
        }

        .enter-button:hover {
            background: rgba(255, 255, 255, 0.9);
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
            color: #2d3748;
        }

        .enter-button i {
            transition: transform 0.3s ease;
        }

        .enter-button:hover i {
            transform: scale(1.1);
        }

        @media (max-width: 768px) {
            .landing-content {
                padding: 2rem 1rem;
            }

            .quote-text {
                font-size: 1.1rem;
            }
        }
    </style>
{{- end -}}
